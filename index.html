<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Translation</title>
    <!-- apple-touch-icon for home screen -->
    <link rel="apple-touch-icon" href="icon.png">
    <style>
        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        body {
            background-color: #f4eae1; /* 温かみのあるベージュ */
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            color: #333333;
        }
        .app-container {
            width: 100%;
            max-width: 480px;
            background-color: #f4eae1; /* 全体をベージュで統一 */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
            position: relative;
        }
        /* ヘッダーデザイン */
        header {
            padding: 10px 0 20px 0;
            border-bottom: 1px solid #dcd1c4;
            margin-bottom: 20px;
        }
        .header-title {
            font-size: 24px;
            font-weight: 500;
            margin: 0;
            color: #4a3e3d;
            letter-spacing: 0.5px;
        }
        /* 言語切り替えバー */
        .lang-swap-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #ffffff;
            border-radius: 30px;
            padding: 6px 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            border: 1px solid #e6ded5;
        }
        .lang-badge {
            font-size: 16px;
            font-weight: bold;
            color: #4a3e3d;
            padding: 6px 12px;
            border-radius: 20px;
            transition: all 0.2s ease;
        }
        .swap-arrow {
            font-size: 20px;
            color: #7d706e;
            cursor: pointer;
            padding: 4px 10px;
            user-select: none;
            transition: transform 0.3s ease;
        }
        .swap-arrow:active {
            transform: scale(0.9) rotate(180deg);
        }
        /* 入出力エリア */
        .text-box-wrapper {
            background: #ffffff;
            border-radius: 16px;
            border: 1px solid #e6ded5;
            box-shadow: 0 3px 10px rgba(0,0,0,0.04);
            margin-bottom: 16px;
            padding: 16px;
            display: flex;
            flex-direction: column;
        }
        .text-box-wrapper label {
            font-size: 13px;
            color: #8c7e7c;
            margin-bottom: 8px;
            font-weight: 600;
        }
        textarea {
            width: 100%;
            height: 130px;
            border: none;
            resize: none;
            font-size: 17px;
            color: #2c2c2c;
            outline: none;
            background: transparent;
            padding: 0;
            line-height: 1.5;
        }
        textarea::placeholder {
            color: #b0a69a;
        }
        /* 変換ボタンエリア（右寄せ） */
        .btn-container {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 16px;
        }
        .translate-btn {
            background-color: #3b5998; /* 手書き画像に合わせた落ち着いたブルー */
            color: #ffffff;
            border: none;
            border-radius: 8px;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 3px 6px rgba(59, 89, 152, 0.3);
            transition: background-color 0.2s, transform 0.1s;
        }
        .translate-btn:active {
            background-color: #2d4373;
            transform: scale(0.98);
        }
        /* 出力表示エリア */
        .output-box {
            min-height: 130px;
            font-size: 17px;
            color: #2c2c2c;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .output-box.placeholder {
            color: #b0a69a;
        }
        /* 読み上げボタン */
        .speech-btn-wrapper {
            display: flex;
            justify-content: flex-start;
            margin-top: 8px;
        }
        .speech-btn {
            background: none;
            border: none;
            color: #3b5998;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .speech-btn:active {
            background-color: #f0ede9;
        }
        /* 簡易ローディング */
        .loading-dots {
            display: none;
            color: #3b5998;
            font-weight: bold;
            font-size: 15px;
            margin-top: 10px;
            text-align: center;
        }
        /* 設定ボタンと非表示のAPI設定 */
        .settings-toggle {
            position: absolute;
            top: 25px;
            right: 20px;
            font-size: 14px;
            color: #7d706e;
            cursor: pointer;
            text-decoration: underline;
        }
        .settings-panel {
            display: none;
            background: #ffffff;
            border: 1px solid #e6ded5;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 16px;
        }
        .settings-panel input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <span class="settings-toggle" onclick="toggleSettings()">⚙️ 設定</span>
    <header>
        <h1 class="header-title">Translation</h1>
    </header>

    <!-- APIキー設定パネル（必要な時だけ開く） -->
    <div id="settingsPanel" class="settings-panel">
        <label style="font-size: 12px; font-weight: bold; display: block; margin-bottom: 6px;">Gemini APIキー:</label>
        <input type="password" id="apiKeyInput" placeholder="ここにAPIキーを入力（自動保存されます）" onchange="saveApiKey()">
        <p style="font-size: 11px; color: #888; margin: 4px 0 0 0;">※コード内の「EMBEDDED_API_KEY」に直接書き込んでいる場合は入力不要です。</p>
    </div>

    <!-- 言語切り替えバー -->
    <div class="lang-swap-container">
        <div class="lang-badge" id="sourceLangLabel">韓国語</div>
        <div class="swap-arrow" onclick="swapLanguages()">➔</div>
        <div class="lang-badge" id="targetLangLabel">日本語</div>
    </div>

    <!-- 入力エリア -->
    <div class="text-box-wrapper">
        <label id="inputLabel">韓国語 入力</label>
        <textarea id="inputText" placeholder="タップしてテキストを入力..."></textarea>
    </div>

    <!-- 変換ボタン（右寄せ） -->
    <div class="btn-container">
        <button class="translate-btn" onclick="executeTranslation()">変換</button>
    </div>

    <div class="loading-dots" id="loadingIndicator">翻訳しています...</div>

    <!-- 出力エリア -->
    <div class="text-box-wrapper">
        <label id="outputLabel">日本語 訳</label>
        <div id="outputText" class="output-box placeholder">ここに結果が表示されます。</div>
        <div class="speech-btn-wrapper">
            <button class="speech-btn" onclick="speakText()">🔊 読み上げ</button>
        </div>
    </div>
</div>

<script>
    // ==========================================
    // 【重要】ここに取得したAPIキーを直接貼り付けると、
    // スマホで開くだけで即座に使用できるようになります！
    // 例: const EMBEDDED_API_KEY = "AIzaSy...";
    // ==========================================
    const EMBEDDED_API_KEY = "";

    // 翻訳モードの管理 (ko = 韓国語から日本語, ja = 日本語から韓国語)
    let currentMode = "ko"; 

    window.onload = function() {
        // 保存されたAPIキーがあれば復元
        const savedKey = localStorage.getItem('user_gemini_api_key');
        if (savedKey) {
            document.getElementById('apiKeyInput').value = savedKey;
        } else if (EMBEDDED_API_KEY) {
            document.getElementById('apiKeyInput').value = EMBEDDED_API_KEY;
        }
    }

    function toggleSettings() {
        const panel = document.getElementById('settingsPanel');
        panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
    }

    function saveApiKey() {
        const key = document.getElementById('apiKeyInput').value;
        localStorage.setItem('user_gemini_api_key', key);
    }

    function swapLanguages() {
        const sourceLabel = document.getElementById('sourceLangLabel');
        const targetLabel = document.getElementById('targetLangLabel');
        const inputLabel = document.getElementById('inputLabel');
        const outputLabel = document.getElementById('outputLabel');
        const inputText = document.getElementById('inputText');
        const outputText = document.getElementById('outputText');

        // 入力と出力の中身をスワップ
        const tempText = inputText.value;
        inputText.value = outputText.classList.contains('placeholder') ? '' : outputText.innerText;
        
        if (tempText) {
            outputText.innerText = tempText;
            outputText.classList.remove('placeholder');
        } else {
            outputText.innerText = "ここに結果が表示されます。";
            outputText.classList.add('placeholder');
        }

        if (currentMode === "ko") {
            currentMode = "ja";
            sourceLabel.innerText = "日本語";
            targetLabel.innerText = "韓国語";
            inputLabel.innerText = "日本語 入力";
            outputLabel.innerText = "韓国語 訳";
        } else {
            currentMode = "ko";
            sourceLabel.innerText = "韓国語";
            targetLabel.innerText = "日本語";
            inputLabel.innerText = "韓国語 入力";
            outputLabel.innerText = "日本語 訳";
        }
    }

    async function executeTranslation() {
        const inputText = document.getElementById('inputText').value.trim();
        const outputBox = document.getElementById('outputText');
        const loader = document.getElementById('loadingIndicator');

        // APIキーの取得優先度：1. コード内の定数、2. 画面で入力したキー
        let apiKey = EMBEDDED_API_KEY || document.getElementById('apiKeyInput').value.trim();

        if (!apiKey) {
            alert("右上の「⚙️ 設定」からGemini APIキーを入力するか、HTMLコード内の「EMBEDDED_API_KEY」にAPIキーを設定してください。");
            document.getElementById('settingsPanel').style.display = 'block';
            return;
        }

        if (!inputText) {
            alert("翻訳するテキストを入力してください。");
            return;
        }

        loader.style.display = "block";
        outputBox.innerText = "";
        outputBox.classList.add('placeholder');

        // gemini-1.5-flash は2026年に提供終了（シャットダウン）済みのため、
        // 現行モデルの "v1beta" エンドポイントを使用します。
        // 混雑エラー対策として、メインモデルがダメな場合に備えて予備モデルも用意しておきます。
        const MODEL_CANDIDATES = ["gemini-flash-latest", "gemini-flash-lite-latest"];
        const buildUrl = (model) =>
            `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;

        // 翻訳用のプロンプト構築
        let promptText = "";
        if (currentMode === "ko") {
            promptText = `あなたは優秀な韓国語・日本語の通訳者です。
以下の韓国語を、旅行で使いやすい自然な日本語に翻訳してください。
余計な解説、挨拶、前置き、引用符などは一切含めず、「翻訳結果のテキストのみ」を返してください。

韓国語:
${inputText}`;
        } else {
            promptText = `あなたは優秀な韓国語・日本語の通訳者です。
以下の日本語を、現地でそのまま見せたり話したりして伝わる自然な韓国語に翻訳してください。
余計な解説、挨拶、前置き、引用符などは一切含めず、「翻訳結果のテキストのみ」を返してください。

日本語:
${inputText}`;
        }

        // 「思考」機能の指定方法はモデル世代によって異なり(thinkingLevel or thinkingBudget)、
        // かつGoogle側の仕様変更で急に無効化されることがあるため、複数パターンを順番に試す
        const GENERATION_CONFIG_VARIANTS = [
            { thinkingConfig: { thinkingLevel: "minimal" }, maxOutputTokens: 500 }, // Gemini 3系向け
            { thinkingConfig: { thinkingBudget: 0 }, maxOutputTokens: 500 },        // Gemini 2.5系向け
            { maxOutputTokens: 500 }                                                // 思考設定なし（最終手段）
        ];

        const buildRequestBody = (generationConfig) => ({
            contents: [{
                parts: [{ text: promptText }]
            }],
            generationConfig
        });

        // 1つのモデル・設定パターンにつき、混雑エラー(429/503)なら少し待って最大2回までリトライ
        async function callGemini(model, generationConfig, retriesLeft) {
            const response = await fetch(buildUrl(model), {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(buildRequestBody(generationConfig))
            });

            if (!response.ok) {
                const errData = await response.json().catch(() => ({}));
                const message = errData.error?.message || "APIエラーが発生しました。";
                const isOverloaded = response.status === 429 || response.status === 503 ||
                    /high demand|overloaded|unavailable/i.test(message);
                const isRetired = response.status === 404 && /no longer available/i.test(message);
                const isInvalidArg = response.status === 400; // thinkingConfigの形式違いなどはここに来る

                if (isOverloaded && retriesLeft > 0) {
                    await new Promise(r => setTimeout(r, 400));
                    return callGemini(model, generationConfig, retriesLeft - 1);
                }

                const err = new Error(message);
                err.overloaded = isOverloaded || isRetired; // 次の候補モデルへ切り替える対象
                err.invalidArg = isInvalidArg; // 次のgenerationConfigパターンへ切り替える対象
                throw err;
            }

            return response.json();
        }

        try {
            let data;
            let lastError;

            outer:
            for (const model of MODEL_CANDIDATES) {
                for (const generationConfig of GENERATION_CONFIG_VARIANTS) {
                    try {
                        data = await callGemini(model, generationConfig, 2);
                        break outer; // 成功したら全ループを抜ける
                    } catch (err) {
                        lastError = err;
                        if (err.invalidArg) continue; // 同じモデルで次のconfigパターンを試す
                        if (err.overloaded) break;     // このモデルは諦めて次の候補モデルへ
                        throw err;                      // それ以外のエラーは即座に投げる
                    }
                }
            }

            if (!data) throw lastError || new Error("翻訳に失敗しました。");

            if (data.candidates && data.candidates[0].content.parts[0].text) {
                const result = data.candidates[0].content.parts[0].text.trim();
                outputBox.innerText = result;
                outputBox.classList.remove('placeholder');
            } else {
                outputBox.innerText = "翻訳結果の取得に失敗しました。";
            }
        } catch (error) {
            console.error(error);
            if (error instanceof TypeError && error.message.includes("Failed to fetch")) {
                // fetch自体がブロックされた場合（サーバーからの応答すら受け取れていない）
                let reason = "・ネット接続が切れていないか確認してください。\n" +
                    "・広告ブロッカーやプライバシー系の拡張機能（uBlock Originなど）が\n" +
                    "  generativelanguage.googleapis.com への通信をブロックしていないか確認してください。\n" +
                    "・このHTMLをファイルとして直接開いている場合、ブラウザやセキュリティソフトが\n" +
                    "  ローカルファイルからの外部通信を制限していることがあります。\n" +
                    "・社内/学校のWi-Fiやフィルタリング機能付きルーターなど、\n" +
                    "  特定のネットワークで外部APIがブロックされていないか確認してください。\n" +
                    "・別のブラウザ（Chrome/Safariなど）や別のネットワーク（Wi-Fi⇔モバイル回線）で試してみてください。";
                outputBox.innerText = `エラー: サーバーに接続できませんでした（Failed to fetch）\n\n${reason}`;
            } else if (error.overloaded) {
                outputBox.innerText = `エラー: 現在Gemini側が混雑しています（複数モデルで再試行しましたが失敗しました）。\n\n・少し時間をおいてから、もう一度「変換」を押してみてください。\n・時間帯を変えると改善することが多いです。`;
            } else {
                outputBox.innerText = `エラー: ${error.message}\n\n・APIキーが正しいか確認してください。\n・ネット接続を確認してください。`;
            }
        } finally {
            loader.style.display = "none";
        }
    }

    // 日本語・韓国語の読み上げ機能
    function speakText() {
        const text = document.getElementById('outputText').innerText;
        const placeholderActive = document.getElementById('outputText').classList.contains('placeholder');
        if (!text || placeholderActive) return;

        const utterance = new SpeechSynthesisUtterance(text);
        if (currentMode === "ko") {
            utterance.lang = 'ja-JP'; // 翻訳結果の日本語を話す
        } else {
            utterance.lang = 'ko-KR'; // 翻訳結果の韓国語を話す
        }
        window.speechSynthesis.speak(utterance);
    }
</script>

</body>
</html>
